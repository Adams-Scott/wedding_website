<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Day Itinerary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="itinerary-page">
  <div class="page-grid">
    <div class="side-label">
      Wedding Day
      <div class="side-line"></div>
    </div>

    <div class="content">
      <span class="intro-label">Itinerary</span>
      <h1 class="title">A relaxed evening of ceremony, dinner, and dancing.</h1>

      <div class="schedule">
        <div class="schedule-item">
          <div class="schedule-time">4:30 PM</div>
          <div class="schedule-event">Guest arrival</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">5:00 PM</div>
          <div class="schedule-event">Ceremony</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">5:30 PM</div>
          <div class="schedule-event">Cocktail hour begins</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">6:00 PM</div>
          <div class="schedule-event">Dinner service</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">7:00 PM</div>
          <div class="schedule-event">Toasts</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">7:20 PM</div>
          <div class="schedule-event">Cake</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">7:30 PM</div>
          <div class="schedule-event">Dancing</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">9:00 PM</div>
          <div class="schedule-event">Last call</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">9:15 PM</div>
          <div class="schedule-event">Final song</div>
        </div>
        <div class="schedule-item">
          <div class="schedule-time">9:30 PM</div>
          <div class="schedule-event">Sparkler send-off</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
